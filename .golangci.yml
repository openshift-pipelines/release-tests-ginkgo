version: "2"

run:
  timeout: 10m
  modules-download-mode: readonly

linters:
  default: none
  enable:
    # Core correctness
    - errcheck        # Unchecked errors
    - govet           # go vet passes
    - staticcheck     # SA, S1, ST, QF checks (replaces deprecated megacheck)
    - ineffassign     # Detect ineffectual assignments
    - unused          # Unused code (replaces deadcode/structcheck/varcheck)

    # Style / maintainability
    - misspell        # Spelling mistakes in comments/strings
    - unconvert       # Unnecessary type conversions
    - unparam         # Functions always called with the same argument value
    - revive          # Drop-in replacement for golint with sensible defaults

    # Security
    - gosec           # Security issues (G-checks)

    # Test quality
    - testifylint     # Misuse of testify (if used)
    - thelper         # t.Helper() not called in test helpers

    # Error handling
    # wrapcheck disabled: k8s/Tekton client calls in test helpers are too verbose to wrap
    # - wrapcheck       # Errors from external packages should be wrapped
    - errorlint       # Detect non-standard error wrapping

    # Performance
    - prealloc        # Slice pre-allocation opportunities

  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment   # Too noisy for test code
        - shadow           # Too noisy: common pattern in Go error handling

    staticcheck:
      checks:
        - "all"
        - "-ST1001"  # dot-imports: revive already enforces this

    revive:
      rules:
        - name: exported
          arguments:
            - checkPrivateReceivers
        - name: var-naming
        - name: indent-error-flow
        - name: error-return
        - name: increment-decrement

    gosec:
      excludes:
        - G101   # Potential hardcoded credentials — false positives in test fixtures

    misspell:
      locale: US

    errorlint:
      errorf: true
      asserts: true
      comparison: true

  exclusions:
    rules:
      # Test files: relax some rules
      - path: "_test\\.go$"
        linters:
          - wrapcheck
          - gosec
          - unparam
      # dot-imports are idiomatic in Ginkgo/Gomega — suppress all revive in test files
      - path: "_test\\.go$"
        linters:
          - revive
      # wait package functions use WaitFor* prefix intentionally for clarity
      - source: "func WaitFor"
        linters:
          - revive
      # gosec: G204/G304/G703 are expected in test helper code
      - linters:
          - gosec
        text: "G204|G304|G703"

issues:
  max-issues-per-linter: 50
  max-same-issues: 10

formatters:
  enable:
    - gofmt           # Formatting
    - goimports       # Import ordering
  settings:
    goimports:
      local-prefixes:
        - github.com/openshift-pipelines/release-tests-ginkgo

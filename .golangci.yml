version: "2"

run:
  timeout: 10m
  modules-download-mode: readonly

linters:
  default: none
  enable:
    # Core correctness
    - errcheck        # Unchecked errors
    - govet           # go vet passes
    - staticcheck     # SA, S1, ST, QF checks (replaces deprecated megacheck)
    - ineffassign     # Detect ineffectual assignments
    - unused          # Unused code (replaces deadcode/structcheck/varcheck)

    # Style / maintainability
    - gofmt           # Formatting
    - goimports       # Import ordering
    - misspell        # Spelling mistakes in comments/strings
    - unconvert       # Unnecessary type conversions
    - unparam         # Functions always called with the same argument value
    - revive          # Drop-in replacement for golint with sensible defaults

    # Security
    - gosec           # Security issues (G-checks)

    # Test quality
    - testifylint     # Misuse of testify (if used)
    - thelper         # t.Helper() not called in test helpers

    # Error handling
    - wrapcheck       # Errors from external packages should be wrapped
    - errorlint       # Detect non-standard error wrapping

    # Performance
    - prealloc        # Slice pre-allocation opportunities

linters-settings:
  govet:
    enable-all: true
    disable:
      - fieldalignment   # Too noisy for test code

  revive:
    rules:
      - name: exported
        arguments:
          - checkPrivateReceivers
          - sayRepetitiveInsteadOfStutters
      - name: var-naming
      - name: indent-error-flow
      - name: error-return
      - name: increment-decrement

  gosec:
    excludes:
      - G101   # Potential hardcoded credentials — false positives in test fixtures
      - G304   # File path provided as taint input — expected in test helpers
      - G306   # Permissions — test-only file writes

  misspell:
    locale: US

  goimports:
    local-prefixes: github.com/openshift-pipelines/release-tests-ginkgo

  wrapcheck:
    ignorePackageGlobs:
      - github.com/openshift-pipelines/release-tests-ginkgo/*
      - github.com/onsi/gomega/*
      - github.com/onsi/ginkgo/*

  errorlint:
    errorf: true
    asserts: true
    comparison: true

issues:
  exclude-rules:
    # Test files: relax some rules
    - path: "_test\\.go$"
      linters:
        - wrapcheck
        - gosec
        - unparam
    # Suite bootstrap files are intentionally simple
    - path: "suite_test\\.go$"
      linters:
        - revive

  max-issues-per-linter: 50
  max-same-issues: 10
  fix: false

# default.properties
# Properties set here will be available to the test execution as environment variables
# This file should be updated for each release branch with the correct component versions

# Operator installation configuration
CHANNEL = latest
CATALOG_SOURCE = redhat-operators
SUBSCRIPTION_NAME = openshift-pipelines-operator-rh

# Component versions - Update these for each release
# Use major.minor format (e.g., v1.9 or 1.22) to match against any patch version
CHAINS_VERSION = v0.26
HUB_VERSION = v1.23
MANUAL_APPROVAL_VERSION = v0.8
OPERATOR_VERSION = 0.79
OSP_VERSION = 1.22
PAC_VERSION = 0.42
PIPELINE_VERSION = v1.9
RESULTS_VERSION = v0.18
TRIGGERS_VERSION = v0.35

# Client versions
# Use major.minor format to match any patch version
TKN_CLIENT_VERSION = 0.44

# Test configuration
TARGET = openshift
OSP_TUTORIAL_BRANCH = master

# Test execution settings
TEST_TIMEOUT = 30m
ARTIFACTS_DIR = ./test-reports

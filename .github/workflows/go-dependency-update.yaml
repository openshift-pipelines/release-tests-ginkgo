name: Dependency Updates

on:
  schedule:
    # Every Monday at 08:00 UTC — after dependabot PRs have been opened
    - cron: "0 8 * * 1"
  workflow_dispatch:
    inputs:
      update_mode:
        description: "Update mode: patch | minor | all"
        required: false
        default: "minor"

permissions:
  contents: write
  pull-requests: write

jobs:
  go-update:
    name: go get -u (minor+patch)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Update direct dependencies
        id: update
        run: |
          MODE="${{ github.event.inputs.update_mode || 'minor' }}"
          echo "Update mode: $MODE"

          # Capture current state
          cp go.mod go.mod.before

          if [[ "$MODE" == "all" ]]; then
            go get -u ./...
          else
            # Update only direct deps at patch/minor level using semver-aware flag
            mapfile -t DIRECT_DEPS < <(
              go list -m -f '{{if not .Indirect}}{{.Path}}{{end}}' all \
                | grep -v '^github.com/openshift-pipelines/release-tests-ginkgo$'
            )
            for dep in "${DIRECT_DEPS[@]}"; do
              echo "Updating $dep..."
              go get -u=patch "$dep" 2>/dev/null || true
            done
          fi

          go mod tidy

          # Check if anything changed
          if diff -q go.mod go.mod.before > /dev/null && diff -q go.sum go.sum.before > /dev/null 2>&1; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "### Updated dependencies:" >> "$GITHUB_STEP_SUMMARY"
            diff go.mod.before go.mod | grep '^[+-]' | grep -v '^---\|^+++' >> "$GITHUB_STEP_SUMMARY" || true
          fi

      - name: Build to verify updates don't break compilation
        if: steps.update.outputs.changed == 'true'
        run: go build ./...

      - name: Run unit tests after update
        if: steps.update.outputs.changed == 'true'
        run: go test -count=1 -timeout=5m ./pkg/... || true

      - name: Create Pull Request
        if: steps.update.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(deps): weekly Go dependency update"
          title: "chore(deps): weekly Go dependency update"
          body: |
            ## Weekly Go Dependency Update

            This PR was automatically created by the **Dependency Updates** workflow.

            ### What changed
            Go modules updated via `go get -u` (patch/minor).
            Run `go mod tidy` was applied automatically.

            ### Checklist
            - [ ] CI passes
            - [ ] No unexpected major version bumps
            - [ ] `go.sum` is consistent

            > **Note:** This PR intentionally excludes major version bumps.
            > For major updates, open a separate PR with context.
          branch: "chore/go-dependency-update"
          delete-branch: true
          labels: |
            dependencies
            go
            area/ci
          draft: false

  ginkgo-version-sync:
    name: Sync Ginkgo CLI version in Dockerfile.CI
    runs-on: ubuntu-latest
    needs: go-update
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: "chore/go-dependency-update"
          token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true   # Branch may not exist if nothing changed

      - name: Sync GINKGO_VERSION in Dockerfile.CI
        run: |
          GINKGO_IN_MOD=$(grep 'github.com/onsi/ginkgo/v2' go.mod | awk '{print $2}')
          GINKGO_IN_DOCKERFILE=$(grep 'GINKGO_VERSION=' Dockerfile.CI | head -1 | sed 's/.*GINKGO_VERSION=//' | tr -d '"')
          echo "go.mod Ginkgo:    $GINKGO_IN_MOD"
          echo "Dockerfile Ginkgo: $GINKGO_IN_DOCKERFILE"

          if [[ "$GINKGO_IN_MOD" != "$GINKGO_IN_DOCKERFILE" ]]; then
            sed -i "s|ENV GINKGO_VERSION=.*|ENV GINKGO_VERSION=${GINKGO_IN_MOD}|" Dockerfile.CI
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add Dockerfile.CI
            git diff --cached --quiet || git commit -m "chore(ci): sync Ginkgo CLI version to ${GINKGO_IN_MOD}"
            git push || true
          else
            echo "Ginkgo versions are in sync."
          fi

  govulncheck:
    name: Vulnerability Report
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck and summarize
        run: |
          govulncheck ./... 2>&1 | tee vuln-report.txt
          echo "### govulncheck report" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat vuln-report.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
        continue-on-error: true   # Advisory — tracked as summary, not a blocker

      - name: Upload vulnerability report
        uses: actions/upload-artifact@v7
        with:
          name: vuln-report-${{ github.run_id }}
          path: vuln-report.txt
          retention-days: 30

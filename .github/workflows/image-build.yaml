name: CI Image Build & Push

on:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]
    paths:
      - "Dockerfile.CI"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/image-build.yaml"
  pull_request:
    branches: ["main"]
    paths:
      - "Dockerfile.CI"
  workflow_dispatch:
    inputs:
      push_image:
        description: "Push image to registry (true/false)"
        required: false
        default: "true"

env:
  REGISTRY: quay.io
  # Override IMAGE_REPO by setting the repository secret QUAY_IMAGE_REPO
  # e.g. quay.io/openshift-pipeline/release-tests-ginkgo
  IMAGE_REPO: ${{ vars.QUAY_IMAGE_REPO || 'quay.io/openshift-pipeline/release-tests-ginkgo' }}

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build CI Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_REPO }}
          tags: |
            # Branch push → :main; main branch also gets :latest
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
            # Tag push → :v1.2.3 and :1.2
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # PR → :pr-42
            type=ref,event=pr
            # Short SHA always attached
            type=sha,prefix=sha-

      - name: Log in to Quay.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Build (and optionally push)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.CI
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: Image digest
        run: echo "Image digest ${{ steps.build-push.outputs.digest }}"

  scan:
    name: Scan CI Image for CVEs
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Extract short SHA tag
        id: sha
        run: echo "tag=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to Quay.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "${{ env.IMAGE_REPO }}:${{ steps.sha.outputs.tag }}"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"    # Do not fail CI but upload report

      - name: Upload Trivy SARIF results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

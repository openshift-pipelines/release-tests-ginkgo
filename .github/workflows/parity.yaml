name: Parity Validation

on:
  pull_request:
    branches: ["main", "release-*"]
    paths:
      - "tests/**"
      - "scripts/parity-count.sh"
      - "scripts/parity-labels.sh"
      - "scripts/parity-results.sh"
  push:
    branches: ["main"]
    paths:
      - "tests/**"
  schedule:
    # Run every Monday at 07:00 UTC for continuous baseline tracking
    - cron: "0 7 * * 1"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  parity-count:
    name: Test Count Parity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Install Ginkgo CLI
        run: |
          GINKGO_VERSION=$(grep 'github.com/onsi/ginkgo/v2' go.mod | awk '{print $2}')
          go install github.com/onsi/ginkgo/v2/ginkgo@${GINKGO_VERSION}

      - name: Count tests per suite
        run: |
          echo "### Ginkgo test inventory" | tee parity-count.txt
          echo "" >> parity-count.txt
          for suite_dir in tests/*/; do
            suite=$(basename "$suite_dir")
            count=$(ginkgo labels --json "$suite_dir" 2>/dev/null | \
                      python3 -c "import sys,json; specs=json.load(sys.stdin); print(len(specs))" 2>/dev/null || \
                      grep -r 'It(' "$suite_dir" --include='*_test.go' | wc -l)
            printf "%-20s %s tests\n" "$suite" "$count" | tee -a parity-count.txt
          done

      - name: Run parity-count script
        run: bash scripts/parity-count.sh | tee parity-count-script.txt

      - name: Upload parity report
        uses: actions/upload-artifact@v4
        with:
          name: parity-count-${{ github.sha }}
          path: |
            parity-count.txt
            parity-count-script.txt
          retention-days: 30

  parity-labels:
    name: Label Parity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate labels are well-formed
        run: bash scripts/parity-labels.sh
          "

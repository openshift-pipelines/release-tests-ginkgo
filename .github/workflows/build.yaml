name: Build & Verify

on:
  pull_request:
    branches: ["main", "release-*"]
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Verify go.sum is tidy
        run: |
          go mod tidy
          if ! git diff --quiet go.sum go.mod; then
            echo "go mod tidy produced changes - please run 'go mod tidy' and commit:"
            git diff go.sum go.mod
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: Build all packages
        run: go build ./...


  compile-tests:
    name: Compile test suites
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Compile all test packages (no run)
        # Validates that all test packages compile without needing a cluster.
        run: |
          go test -run='^$' -count=0 ./tests/... 2>&1

  security-scan:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        # Advisory-only: we report all vulns but only fail on ones that are
        # both fixable (have a "Fixed in" version) AND not in our ignore list.
        # Vulns in third-party deps with "Fixed in: N/A" are tracked below and
        # cannot be resolved by us — they must be fixed upstream.
        #
        # Known unfixable (Fixed in: N/A) — remove when upstream releases a fix:
        #   GO-2026-4730  tektoncd/pipeline@v1.9.2  controller panic via long resolver name
        #   GO-2023-1901  tektoncd/pipeline@v1.9.2  pipelines don't validate child UIDs
        run: |
          set +e
          govulncheck -json ./... > vuln-report.json 2>&1
          govulncheck ./... > vuln-report.txt 2>&1
          EXIT_CODE=$?
          set -e

          echo "### govulncheck report" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -5 vuln-report.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

          if [[ $EXIT_CODE -ne 0 ]]; then
            # Check if every finding is in our known-unfixable list
            KNOWN_UNFIXABLE="GO-2026-4730 GO-2023-1901"
            UNKNOWN_VULNS=$(grep 'Vulnerability #' vuln-report.txt | \
              grep -oP 'GO-[0-9]+-[0-9]+' | \
              grep -vFf <(echo "$KNOWN_UNFIXABLE" | tr ' ' '\n') || true)

            if [[ -n "$UNKNOWN_VULNS" ]]; then
              echo "::error::New fixable vulnerabilities found (not in ignore list):"
              echo "$UNKNOWN_VULNS"
              cat vuln-report.txt
              exit 1
            else
              echo "::warning::Only known unfixable vulns found (Fixed in: N/A). See report."
              cat vuln-report.txt
            fi
          fi

      - name: Upload vulnerability report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: vuln-report-${{ github.run_id }}
          path: |
            vuln-report.txt
            vuln-report.json
          retention-days: 30

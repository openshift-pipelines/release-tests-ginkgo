name: Lint

on:
  pull_request:
    branches: ["main", "release-*"]
  push:
    branches: ["main"]

permissions:
  contents: read
  pull-requests: read

jobs:
  golangci-lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          args: --timeout=10m

  gofmt:
    name: gofmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check gofmt
        run: |
          DIFF=$(gofmt -l ./pkg ./cmd ./tests 2>&1)
          if [[ -n "$DIFF" ]]; then
            echo "The following files are not gofmt-formatted:"
            echo "$DIFF"
            echo ""
            echo "Run: gofmt -w ./pkg ./cmd ./tests"
            exit 1
          fi
          echo "All Go files are properly formatted."

  go-generate-check:
    name: go generate check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check go generate is up to date
        run: |
          go generate ./...
          if ! git diff --quiet; then
            echo "go generate produced uncommitted changes:"
            git diff
            exit 1
          fi
          echo "go generate output is up to date."
